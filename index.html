<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED FIT | STREET STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #FF3131;
            --beige: #F5F5DC;
            --pistachio: #B7E4C7;
            --blue: #00B4D8;
            --black: #000000;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--black);
            font-family: 'Cairo', sans-serif;
            padding-bottom: 50px;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--red); border: 2px solid var(--black); }

        /* --- Header / Nav --- */
        header {
            background: var(--red);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--black);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 35px;
            color: var(--black);
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .nav-tools {
            display: flex;
            gap: 15px;
        }

        .search-box {
            background: var(--beige);
            border: 3px solid var(--black);
            padding: 5px 15px;
            display: flex;
            box-shadow: 4px 4px 0px var(--black);
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-weight: bold;
            width: 150px;
        }

        /* --- Hero Section --- */
        .hero {
            background: var(--blue);
            padding: 60px 5%;
            border-bottom: 6px solid var(--black);
            text-align: left;
        }

        .hero h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(40px, 8vw, 80px);
            line-height: 0.9;
            margin: 0;
            color: var(--black);
            text-transform: uppercase;
        }

        /* --- Grid System --- */
        .container {
            padding: 40px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--beige);
            border: 4px solid var(--black);
            padding: 15px;
            position: relative;
            transition: 0.2s;
            box-shadow: 8px 8px 0px var(--black);
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 15px 15px 0px var(--red);
        }

        .card-img {
            width: 100%;
            height: 250px;
            background: var(--pistachio);
            border: 3px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
        }

        .card h3 {
            font-size: 22px;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .price-tag {
            background: var(--red);
            color: white;
            display: inline-block;
            padding: 5px 15px;
            font-weight: 900;
            border: 3px solid var(--black);
            margin-bottom: 15px;
        }

        .btn-buy {
            width: 100%;
            background: var(--black);
            color: white;
            padding: 12px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-buy:hover {
            background: var(--pistachio);
            color: var(--black);
        }

        /* --- Support Section --- */
        .support {
            margin: 50px 5%;
            background: var(--pistachio);
            border: 6px solid var(--black);
            padding: 40px;
            box-shadow: 12px 12px 0px var(--blue);
            text-align: center;
        }

        .whatsapp-link {
            background: var(--red);
            color: white;
            padding: 20px 40px;
            display: inline-block;
            font-size: 25px;
            font-weight: 900;
            text-decoration: none;
            border: 4px solid var(--black);
            box-shadow: 6px 6px 0px var(--black);
            margin-top: 20px;
        }

        .whatsapp-link:hover {
            transform: scale(1.05);
            background: var(--black);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">MED FIT</div>
        <div class="nav-tools">
            <div class="search-box">
                <input type="text" placeholder="SEARCH...">
            </div>
            <div style="font-weight: 900; font-size: 24px;">🛒</div>
        </div>
    </header>

    <section class="hero">
        <h1>NO PAIN<br><span style="color: var(--beige);">NO GAIN.</span></h1>
        <p style="font-weight: 900; background: var(--black); color: white; display: inline-block; padding: 5px 10px;">PREMIUM GYM GEAR STORE</p>
    </section>

    <div class="container">
        <div class="grid">
            <script>
                const colors = ['var(--pistachio)', 'var(--blue)', 'var(--red)', 'var(--beige)'];
                for(let i=1; i<=12; i++) {
                    let randomColor = colors[i % 4];
                    document.write(`
                        <div class="card">
                            <div class="card-img" style="background: ${randomColor}">IMAGE #${i}</div>
                            <h3>Power Pro Gear ${i}</h3>
                            <div class="price-tag">${150 + (i*10)} DH</div>
                            <button class="btn-buy">ADD TO CART</button>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <div class="support">
        <h2 style="font-size: 40px; font-weight: 900;">QUESTIONS?</h2>
        <p style="font-size: 18px; font-weight: 700;">تواصل معنا دابا على الواتساب، الدعم متوفر 24/7</p>
        <a href="https://wa.me/212600000000" class="whatsapp-link">CHAT ON WHATSAPP</a>
    </div>

    <footer style="text-align: center; font-weight: 900; color: white;">
        MED FIT © 2026 - KEEP PUSHING
    </footer>

</body>
</html>
