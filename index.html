<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

body{

header{

  text-align:center;
  font-size:40px;

.container{
  display:flex;
  flex-wrap:wrap;

.card:hover{

button{

  border:none;
  background:red;
  color:white;
  cursor:pointer;
  border-radius:8px;

footer{
