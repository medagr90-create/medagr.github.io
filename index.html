<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED FIT | CUPRA EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3131;
            --bg: #050505;
            --card-bg: rgba(18, 18, 18, 0.9); /* درناها شفافة شوية باش يبان اللوغو وراها */
        }

        body {
            margin: 0;
            background-color: var(--bg);
            /* هاد السطر هو اللي كيحط اللوغو في الخلفية */
            background-image: url('logo.jpg'); 
            background-repeat: repeat;
            background-size: 250px; /* تحكم في كبر اللوغو من هنا */
            background-attachment: fixed; /* كيخلي الخلفية ثابتة فاش كتهبط */
            color: white;
            font-family: 'Inter', sans-serif;
        }

        /* طبقة ضل خفيفة فوق اللوغو باش الكود يبقى مقروء */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* كتحكم في شحال باين اللوغو (0.85 يعني باهت بزاف) */
            z-index: -1;
        }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 3px;
            color: #fff;
        }

        .hero {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 5% 50px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(25, 25, 25, 0.95);
        }

        .img-box {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .price {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1001;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MEDFIT <span style="color:var(--primary)">×</span> CUPRA</div>
        <div style="font-size: 20px;">🛒</div>
    </nav>

    <header class="hero">
        <h1>POWER & STYLE</h1>
        <p style="color: #888;">LIMITED EDITION GYM WEAR</p>
    </header>

    <div class="grid">
        <script>
            for(let i=1; i<=12; i++) {
                document.write(`
                    <div class="product-card">
                        <div class="img-box"></div>
                        <h3>Pro Performance V${i}</h3>
                        <div class="price">350 DH</div>
                        <button class="buy-btn">BUY NOW</button>
                    </div>
                `);
            }
        </script>
    </div>

    <a href="#" class="whatsapp-float">Order via WhatsApp 💬</a>

</body>
</html>
