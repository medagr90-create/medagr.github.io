<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED FIT STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff3131;        /* أحمر رياضي */
            --beige: #f5f5dc;      /* بيج هادئ */
            --pistachio: #93c572;  /* بيستاش */
            --sky-blue: #87ceeb;   /* أزرق سماوي */
            --dark: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--beige);
            color: var(--dark);
        }

        /* --- Navbar --- */
        nav {
            background: var(--dark);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 4px solid var(--red);
        }

        .logo {
            color: var(--beige);
            font-size: 24px;
            font-weight: 900;
        }

        .search-bar {
            flex: 0.5;
            display: flex;
        }

        .search-bar input {
            width: 100%;
            padding: 8px;
            border-radius: 5px 0 0 5px;
            border: none;
        }

        .search-bar button {
            padding: 8px 15px;
            background: var(--sky-blue);
            border: none;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* --- Hero Section --- */
        .hero {
            background: var(--pistachio);
            padding: 40px 5%;
            text-align: center;
            border-bottom: 5px solid var(--sky-blue);
        }

        .hero h1 {
            color: var(--red);
            font-size: 45px;
            margin: 0;
            text-shadow: 2px 2px white;
        }

        /* --- Product Grid --- */
        .container {
            padding: 40px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--dark);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 10px 10px 0px var(--sky-blue);
        }

        .img-placeholder {
            width: 100%;
            height: 200px;
            background: var(--sky-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .product-card h3 {
            margin: 15px 0 5px;
            color: var(--dark);
        }

        .price {
            color: var(--red);
            font-weight: bold;
            font-size: 20px;
        }

        .buy-btn {
            background: var(--pistachio);
            color: var(--dark);
            border: 2px solid var(--dark);
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: var(--red);
            color: white;
        }

        /* --- Support & Contact --- */
        .support-section {
            background: var(--sky-blue);
            padding: 40px 5%;
            margin-top: 50px;
            text-align: center;
            border-top: 5px solid var(--red);
        }

        .whatsapp-btn {
            background: #25d366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            font-size: 18px;
        }

        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MED FIT STORE</div>
        <div class="search-bar">
            <input type="text" placeholder="قلب على البرودوي ديالك...">
            <button>🔍</button>
        </div>
        <div class="nav-icons">
            <span>🛒 سلة المشتريات</span>
            <span>☰</span>
        </div>
    </nav>

    <div class="hero">
        <h1>كولشي موجود باش تبني فورمتك! 💪</h1>
        <p>مزيج بين الجودة، الثمن، والأناقة</p>
    </div>

    <div class="container">
        <div class="grid">
            <script>
                for(let i=1; i<=12; i++) {
                    document.write(`
                        <div class="product-card">
                            <div class="img-placeholder" style="background-color: ${i%2==0 ? 'var(--sky-blue)' : 'var(--pistachio)'}">PRODUCT ${i}</div>
                            <h3>برودوي رقم ${i}</h3>
                            <p class="price">${Math.floor(Math.random() * 500) + 100} DH</p>
                            <button class="buy-btn">أضف للسلة</button>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <div class="support-section">
        <h2>محتاج مساعدة؟ ولا بغيتي تطلب؟ 📞</h2>
        <p>تواصل معنا مباشرة عبر الواتساب للإجابة على جميع تساؤلاتك</p>
        <a href="https://wa.me/212600000000" class="whatsapp-btn">تواصل معنا: 0600000000</a>
    </div>

    <footer>
        © 2026 MED FIT STORE - جميع الحقوق محفوظة
    </footer>

</body>
</html>
