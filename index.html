<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED FIT | PREMIUM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3131;
            --accent-green: #B7E4C7;
            --accent-blue: #00B4D8;
            --bg: #050505;
            --card-bg: #121212;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        /* --- Minimal Navbar --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--primary);
        }

        .menu {
            display: flex;
            gap: 30px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .search-container {
            background: #1a1a1a;
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
        }

        .search-container input {
            background: none;
            border: none;
            color: white;
            padding: 5px;
            outline: none;
        }

        /* --- Hero --- */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a0505 0%, #050505 100%);
        }

        .hero h1 {
            font-size: clamp(50px, 10vw, 100px);
            margin: 0;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Grid --- */
        .container {
            padding: 50px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #222;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 49, 49, 0.2);
        }

        .img-box {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-weight: bold;
        }

        .tag {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--accent-green);
            color: black;
            padding: 5px 12px;
            font-size: 10px;
            font-weight: 900;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .product-card h3 {
            font-size: 18px;
            margin: 10px 0;
            font-weight: 700;
        }

        .price {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* --- Support --- */
        .support-bar {
            background: white;
            color: black;
            margin: 50px 5%;
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .support-bar h2 { margin: 0; font-weight: 900; }

        .wa-btn {
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">MEDFIT.</div>
        <div class="menu">
            <span>Shop</span>
            <span>Clothing</span>
            <span>Supplements</span>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search...">
        </div>
        <div style="font-size: 20px;">🛒</div>
    </nav>

    <header class="hero">
        <p style="color: var(--primary); font-weight: 700; letter-spacing: 5px;">NEW COLLECTION</p>
        <h1>EVOLVE FAST.</h1>
    </header>

    <div class="container">
        <div class="grid">
            <script>
                for(let i=1; i<=12; i++) {
                    document.write(`
                        <div class="product-card">
                            <span class="tag">New Arrival</span>
                            <div class="img-box">IMAGE</div>
                            <h3>Performance Tee V${i}</h3>
                            <div class="price">${299 + i}.00 DH</div>
                            <button class="add-btn">QUICK ADD</button>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <div class="support-bar">
        <div>
            <h2>NEED HELP?</h2>
            <p>Our experts are ready to help you via WhatsApp.</p>
        </div>
        <a href="#" class="wa-btn">CONTACT SUPPORT</a>
    </div>

    <footer style="padding: 40px; text-align: center; color: #444; font-size: 12px;">
        © 2026 MED FIT ELITE. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
